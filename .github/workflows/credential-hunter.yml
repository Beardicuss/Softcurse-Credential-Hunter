name: Automated Credential Hunter

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: credential-hunter
  cancel-in-progress: false

jobs:
  hunt-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      GRAYHAT_ENABLED: ${{ vars.GRAYHAT_ENABLED }}
      GRAYHAT_TOKEN: ${{ secrets.GRAYHAT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate project
        run: pnpm check

      - name: Run multi-source hunt
        run: pnpm hunt

      - name: Verify hunter output
        run: |
          node -e "const fs=require('node:fs');const p='scripts/leaked-api-keys.json';const d=JSON.parse(fs.readFileSync(p,'utf8'));if(!Array.isArray(d.commits))throw new Error('Invalid hunter output: commits missing');console.log('Hunter output verified:',d.commits.length,'records');"

      - name: Sync discoveries to TiDB
        run: pnpm hunt:sync

      - name: Write run summary
        if: always()
        run: |
          echo "## Credential Hunter run" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_STEP_SUMMARY"
