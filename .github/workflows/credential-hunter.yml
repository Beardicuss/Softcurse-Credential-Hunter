name: Automated Credential Hunter

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: credential-hunter
  cancel-in-progress: false

jobs:
  hunt-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      GRAYHAT_ENABLED: ${{ vars.GRAYHAT_ENABLED }}
      GRAYHAT_TOKEN: ${{ secrets.GRAYHAT_TOKEN }}
      GRAYHAT_FETCH_CONTENT: ${{ vars.GRAYHAT_FETCH_CONTENT }}
      GRAYHAT_MAX_QUERIES: ${{ vars.GRAYHAT_MAX_QUERIES }}
      GRAYHAT_MAX_PAGES_PER_QUERY: ${{ vars.GRAYHAT_MAX_PAGES_PER_QUERY }}
      GRAYHAT_PAGE_SIZE: ${{ vars.GRAYHAT_PAGE_SIZE }}
      GRAYHAT_MAX_REQUESTS: ${{ vars.GRAYHAT_MAX_REQUESTS }}
      GRAYHAT_MAX_CONTENT_FILES: ${{ vars.GRAYHAT_MAX_CONTENT_FILES }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Restore Hunter source checkpoint
        id: hunter-state-restore
        uses: actions/cache/restore@v5
        with:
          path: scripts/.hunter-state
          key: hunter-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            hunter-state-${{ runner.os }}-

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate runner syntax
        run: pnpm hunt:check

      - name: Run automated tests
        run: pnpm test

      - name: Run authorized source acceptance
        run: pnpm test:acceptance

      - name: Validate project
        run: pnpm check

      - name: Build dashboard
        run: pnpm build

      - name: Bundle Cloudflare Pages Functions
        run: pnpm pages:build

      - name: Verify workflow contract
        run: pnpm workflow:verify

      - name: Apply database migrations
        run: pnpm db:migrate

      - name: Run multi-source hunt
        run: pnpm hunt

      - name: Verify hunter output
        run: pnpm hunt:verify

      - name: Sync discoveries to TiDB
        run: pnpm hunt:sync

      - name: Plan candidate lifecycle
        run: pnpm hunt:lifecycle
        env:
          HUNTER_RETENTION_APPLY: ${{ vars.HUNTER_RETENTION_APPLY }}
          HUNTER_REVALIDATE_AFTER_DAYS: ${{ vars.HUNTER_REVALIDATE_AFTER_DAYS }}
          HUNTER_INVALID_RETENTION_DAYS: ${{ vars.HUNTER_INVALID_RETENTION_DAYS }}
          HUNTER_UNKNOWN_RETENTION_DAYS: ${{ vars.HUNTER_UNKNOWN_RETENTION_DAYS }}
          HUNTER_AUDIT_RETENTION_APPLY: ${{ vars.HUNTER_AUDIT_RETENTION_APPLY }}
          HUNTER_RATE_LIMIT_AUDIT_DAYS: ${{ vars.HUNTER_RATE_LIMIT_AUDIT_DAYS }}
          HUNTER_SECURITY_AUDIT_DAYS: ${{ vars.HUNTER_SECURITY_AUDIT_DAYS }}
          HUNTER_AUDIT_CLEANUP_BATCH_SIZE: ${{ vars.HUNTER_AUDIT_CLEANUP_BATCH_SIZE }}
      - name: Save Hunter source checkpoint
        if: always()
        uses: actions/cache/save@v5
        with:
          path: scripts/.hunter-state
          key: hunter-state-${{ runner.os }}-${{ github.run_id }}

      - name: Write run summary
        if: always()
        run: |
          echo "## Credential Hunter run" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_STEP_SUMMARY"
